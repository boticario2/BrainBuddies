<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBuddies - Garden Adventure</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Animated Garden Background -->
<div class="background-layer">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="sun"></div>
    <div class="grass-hill"></div>
    <div class="flower flower-1"></div>
    <div class="flower flower-2"></div>
    <div class="flower flower-3"></div>
    <div class="butterfly butterfly-1"></div>
    <div class="butterfly butterfly-2"></div>
</div>

<div id="app">
    <!-- Panda Mascot -->
    <div id="mascot-container">
        <div id="mascot">🐼</div>
        <div id="mascot-bubble">
            <div id="mascot-text">Hello! Welcome to BrainBuddies! 🎉</div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <div class="logo-area">
            <h1>🧠 BrainBuddies</h1>
            <p>Play • Learn • Grow</p>
        </div>
        <button class="big-btn" onclick="goToLevelSelect()">Start Playing 🚀</button>
    </div>

    <!-- Level Select Screen -->
    <div id="level-screen" class="screen">
        <h2>Choose Your Grade</h2>
        <div class="level-grid">
            <div class="level-card" onclick="selectLevel('K')"><span class="level-icon">🟡</span><span class="level-title">Kindergarten</span></div>
            <div class="level-card" onclick="selectLevel('1')"><span class="level-icon">🔵</span><span class="level-title">Grade 1</span></div>
            <div class="level-card" onclick="selectLevel('2')"><span class="level-icon">🟢</span><span class="level-title">Grade 2</span></div>
            <div class="level-card" onclick="selectLevel('3')"><span class="level-icon">🔴</span><span class="level-title">Grade 3</span></div>
        </div>
        <button class="back-btn" onclick="goHome()">Back</button>
    </div>

    <!-- Game Select Screen -->
    <div id="game-select-screen" class="screen">
        <h2 id="selected-grade-title">Select a Game</h2>
        <div class="game-grid" id="game-grid"></div>
        <button class="back-btn" onclick="goToLevelSelect()">Back</button>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay-screen" class="screen">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="game-header"><span id="game-title-display">Game Name</span></div>
        <div id="game-content" class="game-content"></div>
        <div class="feedback-msg" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next ➡️</button>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen">
        <h2>🎉 Great Job! 🎉</h2>
        <div style="font-size:5rem;">🏆</div>
        <p>You finished the game!</p>
        <button class="big-btn" onclick="goToLevelSelect()">Play Another Game</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
